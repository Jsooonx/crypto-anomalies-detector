<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crypto Anomaly Detection Terminal">
    <title>[CRYPTO ANOMALY]</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔳</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <!-- Texture Layers -->
    <div class="noise-overlay"></div>
    <div class="scanlines"></div>

    <div class="layout-grid">
        <!-- Header -->
        <header class="header panel">
            <div class="branding">
                <span class="glitch-text" data-text="CRYPTO ANOMALY">CRYPTO ANOMALY</span>
                <span class="version">v1.1.0_KINETIC</span>
            </div>
            <div class="status-indicator">
                <div id="status-box" class="status-box">CONNECTING...</div>
                <div id="last-update" class="timestamp">00:00:00</div>
            </div>
        </header>

        <!-- Sidebar / Global Metrics -->
        <aside class="sidebar panel">
            <h2 class="panel-title">// SYSTEM_STATS</h2>
            <div id="metrics-container" class="metrics-list">
                <div class="loading-text">AWAITING_DATA_STREAM...</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Pair Cards -->
            <section class="panel">
                <h2 class="panel-title">// ACTIVE_TRACKERS</h2>
                <div class="pairs-grid" id="pairs-grid">
                    <div class="loading-text">SCANNING_MARKETS...</div>
                </div>
            </section>

            <!-- Model Performance -->
            <section class="panel">
                <h2 class="panel-title">// AI_ANALYSIS</h2>
                <div class="model-grid" id="model-grid">
                    <div class="loading-text">LOADING_DATA...</div>
                </div>
            </section>
            
            <!-- CLI Interface -->
            <section class="cli-container panel">
                <h2 class="panel-title">// CONTROL_TERMINAL</h2>
                <div class="cli-output" id="cli-output">
                    <div class="cli-line">> SYSTEM_READY. Type 'help' for commands.</div>
                </div>
                <div class="cli-input-wrapper">
                    <span class="cli-prompt">></span>
                    <input type="text" id="cli-input" class="cli-input" placeholder="Awaiting input..." autocomplete="off">
                </div>
            </section>
        </main>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-left">
            &copy; 2026 Crypto Anomaly Detector.
        </div>
        <div class="footer-right">
            <a href="https://github.com/Jsooonx" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" class="github-icon"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" fill="currentColor"/></svg>
                GitHub
            </a>
        </div>
    </footer>
    <!-- Anomaly Deep-Dive Modal -->
    <div id="anomaly-modal" class="modal-overlay hidden">
        <div class="modal-content panel">
            <div class="modal-header">
                <h2 id="modal-title" class="glitch-text" data-text="">TRACKER_DETAILS</h2>
                <button id="modal-close" class="modal-btn">[X] CLOSE</button>
            </div>
            <div class="modal-body">
                <div class="modal-sidebar" id="modal-details">
                    <!-- Dynamic details inserted here -->
                </div>
                <div id="modal-chart-placeholder" class="chart-placeholder"></div>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
